<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Screener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    header { background: #2563eb; color: white; padding: 20px 40px; }
    header h1 { font-size: 1.5rem; }
    header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
    main { max-width: 860px; margin: 40px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
    textarea { width: 100%; height: 140px; border: 1px solid #d1d5db; border-radius: 8px; padding: 12px; font-size: 0.9rem; resize: vertical; white-space: pre-wrap; }
    .file-drop { border: 2px dashed #93c5fd; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: background 0.2s; }
    .file-drop:hover, .file-drop.dragover { background: #eff6ff; }
    .file-drop p { color: #6b7280; font-size: 0.9rem; }
    .file-drop span { color: #2563eb; font-weight: 600; }
    #file-input { display: none; }
    #file-list { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .file-tag { background: #dbeafe; color: #1d4ed8; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
    .file-tag button { background: none; border: none; cursor: pointer; color: #1d4ed8; font-size: 1rem; line-height: 1; }
    button[type=submit] { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button[type=submit]:hover { background: #1d4ed8; }
    button[type=submit]:disabled { background: #93c5fd; cursor: not-allowed; }
    #results { display: none; }
    .result-card { background: white; border-radius: 12px; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; border-left: 5px solid #2563eb; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .result-header h3 { font-size: 1rem; }
    .score-badge { font-size: 1.4rem; font-weight: 700; color: #2563eb; }
    .score-bar-bg { background: #e5e7eb; border-radius: 99px; height: 8px; margin-bottom: 14px; }
    .score-bar { height: 8px; border-radius: 99px; background: #2563eb; transition: width 0.6s ease; }
    .skills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .skill { padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 500; }
    .matched { background: #dcfce7; color: #166534; }
    .missing { background: #fee2e2; color: #991b1b; }
    .explanation { font-size: 0.85rem; color: #6b7280; margin-top: 10px; }
    .skills-label { font-size: 0.78rem; font-weight: 600; color: #9ca3af; margin-bottom: 6px; }
    #error { background: #fee2e2; color: #991b1b; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none; font-size: 0.9rem; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #chat-section { display: none; margin-bottom: 40px; }
    #chat-messages { max-height: 320px; overflow-y: auto; margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 14px; border-radius: 10px; font-size: 0.88rem; max-width: 85%; line-height: 1.5; white-space: pre-wrap; }
    .msg.user { background: #dbeafe; color: #1e3a8a; align-self: flex-end; }
    .msg.bot { background: #f3f4f6; color: #111827; align-self: flex-start; }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.9rem; outline: none; }
    .chat-input-row button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .chat-input-row button:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Smart Resume Screener</h1>
    <p>Upload resumes and a job description to get AI-powered match scores</p>
  </header>
  <main>
    <div class="card">
      <form id="screen-form">
        <div style="margin-bottom:20px">
          <label for="jd">Job Description</label>
          <textarea id="jd" placeholder="Paste the full job description here..." required></textarea>
        </div>
        <div style="margin-bottom:20px">
          <label>Resumes <span style="font-weight:400;color:#6b7280">(PDF or TXT)</span></label>
          <div class="file-drop" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Drag & drop files here or <span>browse</span></p>
            <p style="margin-top:6px;font-size:0.78rem">Supports .pdf and .txt</p>
          </div>
          <input type="file" id="file-input" multiple accept=".pdf,.txt" />
          <div id="file-list"></div>
        </div>
        <div id="error"></div>
        <button type="submit" id="submit-btn">Screen Resumes</button>
      </form>
    </div>
    <div id="results"></div>
    <div id="chat-section" class="card">
      <h2 style="font-size:1rem;margin-bottom:4px">💬 Ask about the results</h2>
      <p style="font-size:0.82rem;color:#6b7280;margin-bottom:16px">e.g. "Why is resume1.pdf score low?" or "Who is the best candidate?"</p>
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask a question about the screening results..." />
        <button id="chat-btn" onclick="sendChat()">Ask</button>
      </div>
    </div>
  </main>

  <script>
    let fileList = [];

    function renderFileTags() {
      const list = document.getElementById('file-list');
      list.innerHTML = '';
      fileList.forEach((f, i) => {
        const tag = document.createElement('div');
        tag.className = 'file-tag';
        tag.innerHTML = `${f.name} <button onclick="removeFile(${i})" title="Remove">×</button>`;
        list.appendChild(tag);
      });
    }

    function removeFile(index) {
      fileList.splice(index, 1);
      renderFileTags();
    }

    document.getElementById('file-input').addEventListener('change', e => {
      [...e.target.files].forEach(f => fileList.push(f));
      renderFileTags();
      e.target.value = '';
    });

    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      [...e.dataTransfer.files].forEach(f => fileList.push(f));
      renderFileTags();
    });

    function scoreColor(score) {
      if (score >= 60) return '#16a34a';
      if (score >= 35) return '#d97706';
      return '#dc2626';
    }

    document.getElementById('screen-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';

      if (!fileList.length) {
        errorEl.textContent = 'Please upload at least one resume.';
        errorEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Screening...';

      const fd = new FormData();
      fd.append('job_description', document.getElementById('jd').value);
      fileList.forEach(f => fd.append('resumes', f));

      try {
        const res = await fetch('/screen', { method: 'POST', body: fd });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        renderResults(data.results);
      } catch (err) {
        errorEl.textContent = err.message.includes('fetch') ? 'Could not reach server. Please try again in a moment.' : err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Screen Resumes';
      }
    });

    function renderResults(results) {
      const container = document.getElementById('results');
      container.style.display = 'block';
      container.innerHTML = `<h2 style="margin-bottom:16px;font-size:1.1rem">Results <span style="color:#6b7280;font-weight:400">(${results.length} resume${results.length !== 1 ? 's' : ''})</span></h2>`;

      results.forEach(r => {
        const color = scoreColor(r.score);
        const matchedHTML = r.matched_skills.map(s => `<span class="skill matched">${s}</span>`).join('') || '<span style="font-size:0.8rem;color:#9ca3af">None</span>';
        const missingHTML = r.missing_skills.map(s => `<span class="skill missing">${s}</span>`).join('') || '<span style="font-size:0.8rem;color:#9ca3af">None</span>';

        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.borderLeftColor = color;
        card.innerHTML = `
          <div class="result-header">
            <h3>📄 ${r.filename}</h3>
            <span class="score-badge" style="color:${color}">${r.score}%</span>
          </div>
          <div class="score-bar-bg"><div class="score-bar" style="width:${r.score}%;background:${color}"></div></div>
          <div class="skills-label">MATCHED SKILLS</div>
          <div class="skills">${matchedHTML}</div>
          <div class="skills-label" style="margin-top:8px">MISSING SKILLS</div>
          <div class="skills">${missingHTML}</div>
          <div class="explanation">
    💡 ${r.explanation}
</div>

<div style="
    margin-top:15px;
    padding:15px;
    background:#f8fafc;
    border-radius:10px;
    border-left:4px solid #2563eb;
">

    <div style="
        font-weight:bold;
        margin-bottom:10px;
        color:#2563eb;
        font-size:15px;
    ">
        🤖 AI Candidate Analysis
    </div>

    <pre style="
        white-space:pre-wrap;
        font-family:inherit;
        font-size:14px;
        line-height:1.6;
        color:#374151;
        margin:0;
    ">${r.summary}</pre>

</div>
        `;
        container.appendChild(card);
      });

      container.scrollIntoView({ behavior: 'smooth' });
      lastResults = results;
      document.getElementById('chat-section').style.display = 'block';
    }

    let lastResults = [];

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const question = input.value.trim();
      if (!question) return;

      const messages = document.getElementById('chat-messages');
      messages.innerHTML += `<div class="msg user">${question}</div>`;
      input.value = '';

      const btn = document.getElementById('chat-btn');
      btn.disabled = true;
      btn.textContent = '...';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, results: lastResults })
        });
        const data = await res.json();
        messages.innerHTML += `<div class="msg bot">${data.answer}</div>`;
      } catch {
        messages.innerHTML += `<div class="msg bot">Error getting response.</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ask';
        messages.scrollTop = messages.scrollHeight;
      }
    }

    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendChat();
    });
  </script>
</body>
</html>
